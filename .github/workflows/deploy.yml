name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    # Only deploy if SSH credentials are configured as repo secrets
    if: ${{ secrets.SSH_HOST != '' }}

    steps:
      - uses: actions/checkout@v4

      # ── Build frontend ──────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (vite only, no tsc)
        working-directory: frontend
        run: npx vite build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      # ── Copy files to server ────────────────────────────────────────────────
      - name: Copy backend source to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "backend/"
          target: /opt/esgflow

      - name: Copy frontend dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "frontend/dist/"
          target: /opt/esgflow/frontend/dist
          strip_components: 2
          rm: true

      - name: Copy docker-compose and nginx config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "docker-compose.prod.yml,nginx/"
          target: /opt/esgflow

      # ── Restart services on server ──────────────────────────────────────────
      - name: Hotpatch backend + restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e
            cd /opt/esgflow

            echo "=== Deploying backend ==="

            # Inject new Python code directly into running container (no image rebuild)
            BACKEND=$(docker ps --format '{{.Names}}' | grep -iE 'backend' | grep -viE 'celery|beat|worker' | head -1 || true)

            if [ -n "$BACKEND" ]; then
              echo "Container found: $BACKEND — hotpatching..."
              docker cp /opt/esgflow/backend/app/. "$BACKEND":/app/app/
              docker restart "$BACKEND"
              echo "Backend restarted."

              # Also update celery workers
              for WORKER in $(docker ps --format '{{.Names}}' | grep -iE 'celery|beat' || true); do
                echo "Patching worker: $WORKER"
                docker cp /opt/esgflow/backend/app/. "$WORKER":/app/app/
                docker restart "$WORKER"
              done
            else
              echo "No running backend found — doing full compose up..."
              docker compose -f docker-compose.prod.yml up -d --remove-orphans
            fi

            echo "=== Deploy complete: $(date) ==="
