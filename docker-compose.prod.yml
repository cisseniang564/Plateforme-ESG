version: "3.9"

services:
  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/cisseniang564/plateforme-esg/frontend:latest
    restart: unless-stopped
    networks: [esgflow]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Backend (FastAPI) ────────────────────────────────────────────────────
  backend:
    image: ghcr.io/cisseniang564/plateforme-esg/backend:latest
    restart: unless-stopped
    env_file: .env.prod
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [esgflow]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Nginx Reverse Proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl/certs:/etc/ssl/certs:ro
      - ./nginx/ssl/private:/etc/ssl/private:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks: [esgflow]

  # ─── Database ─────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: .env.prod
    environment:
      - POSTGRES_DB=${DATABASE_NAME:-esgflow}
      - POSTGRES_USER=${DATABASE_USER:-esgflow}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [esgflow]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-esgflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks: [esgflow]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  # ─── Celery Worker (désactivé en Bêta — app.tasks non implémenté) ─────────
  # celery_worker:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
  #   restart: unless-stopped
  #   env_file: .env.prod
  #   depends_on:
  #     - db
  #     - redis
  #   networks: [esgflow]

volumes:
  postgres_data:
  redis_data:
  nginx_logs:

networks:
  esgflow:
    driver: bridge
