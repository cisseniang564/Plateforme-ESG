apiVersion: v1
kind: Service
metadata:
  name: esgplatform-backend
  namespace: esgplatform
  labels:
    app: esgplatform-backend
    app.kubernetes.io/name: esgplatform-backend
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app: esgplatform-backend
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
