apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: esgplatform-backend-hpa
  namespace: esgplatform
  labels:
    app: esgplatform-backend
    app.kubernetes.io/name: esgplatform-backend
    app.kubernetes.io/component: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: esgplatform-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: AverageValue
          averageValue: "400Mi"
