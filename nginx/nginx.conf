events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Docker internal DNS
    resolver 127.0.0.11 valid=30s ipv6=off;

    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name greenconnect.cloud www.greenconnect.cloud;
        return 301 https://$host$request_uri;
    }

    # HTTPS
    server {
        listen 443 ssl http2;
        server_name greenconnect.cloud www.greenconnect.cloud;

        ssl_certificate     /etc/ssl/certs/greenconnect.cloud.crt;
        ssl_certificate_key /etc/ssl/private/greenconnect.cloud.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        gzip on;
        gzip_vary on;
        gzip_types text/plain text/css application/javascript application/json image/svg+xml;

        # API routes
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            set $backend http://backend:8000;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            proxy_buffering off;
        }

        # Auth — rate limit strict
        location /api/v1/auth/ {
            limit_req zone=auth burst=20 nodelay;
            set $backend http://backend:8000;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check
        location /health {
            set $backend http://backend:8000;
            proxy_pass $backend;
        }

        # Frontend SPA
        location / {
            set $frontend http://frontend:80;
            proxy_pass $frontend;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
